name: Automated Cloud APK Compile Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Initialize Java 21 Environment (Rule 1)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Inject Android Engine Environment
        uses: android-actions/setup-android@v3

      - name: Invisible SDK License Injection (Rule 4)
        run: |
          sudo mkdir -p /licenses
          sudo chmod 777 /licenses
          echo -e "89aa815992f028b1583d3557ef013af33d5174f8\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nfa4c735d1f3b14a22e861d4c4ca64508c31312c1" > /licenses/android-sdk-license
          mkdir -p ${{ env.ANDROID_HOME }}/licenses
          cp /licenses/android-sdk-license ${{ env.ANDROID_HOME }}/licenses/android-sdk-license

      - name: Initialize Missing Gradle Scripts (Rule 3)
        run: gradle wrapper --gradle-version 9.4.1

      - name: Ensure Script Permissions
        run: chmod +x gradlew

      - name: Execute Android Build Engine Compilation
        run: ./gradlew assembleDebug

      - name: Expose Compiled APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: smart-cards-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
